plugins {
    id 'com.android.application'
}

android {
    namespace 'com.yoman.avoda'
    compileSdk 34

    defaultConfig {
        applicationId "com.yoman.avoda"   // same ID as the existing app
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
}
