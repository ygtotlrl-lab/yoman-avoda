<style>

:root {
  --primary:#1E6FBF; --primaryl:#3A8FDF; --primaryd:#0D4A8A;
  --accent:#F0A500; --accentl:#FFB930; --accentd:#C07800;
  --bg:#F0F4FA; --bgsec:#E4EBF5; --bgcard:#FFFFFF;
  --text:#1A2540; --textmid:#4A5A7A; --textlite:#8A9ABB;
  --border:#D0DAF0; --success:#1A9A5A; --shadow:rgba(30,60,120,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}
.app{max-width:960px;margin:0 auto;padding:14px;}

/* Header */
.hdr{background:linear-gradient(135deg,var(--primary) 0%,#1558a0 100%);border-radius:20px;padding:0;margin-bottom:14px;
  border:none;box-shadow:0 6px 28px rgba(21,88,160,0.35);display:flex;align-items:stretch;overflow:hidden;}
.hdr-logo-wrap{padding:16px 18px;display:flex;align-items:center;justify-content:center;}
.hdr-logo{width:60px;height:60px;object-fit:contain;border-radius:8px;background:white;padding:3px;}
.hdr-mid{flex:1;text-align:center;padding:14px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hdr-bh{font-size:10px;color:rgba(255,255,255,0.6);letter-spacing:4px;margin-bottom:4px;}
.hdr-title-wrap{position:relative;display:inline-block;padding-bottom:8px;}
.hdr-h1{font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;color:#FFFFFF;letter-spacing:1px;line-height:1;}

.hdr-title-wrap::after{content:none;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,0.6);margin-top:8px;letter-spacing:0.5px;}
.hdr-div{display:none;}

/* Archive drill-down */
.arc-btn{background:var(--bgcard);border:2px solid var(--border);border-radius:12px;padding:10px 14px;
  font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;
  transition:all 0.18s;box-shadow:0 2px 6px var(--shadow);text-align:center;min-width:70px;}
.arc-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--bgsec);}
.arc-btn.active{background:var(--primary);color:white;border-color:var(--primary);box-shadow:0 4px 12px rgba(30,111,191,0.3);}
.arc-btn.has-data{border-color:var(--primary);}
.arc-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.arc-crumb{font-size:12px;color:var(--textmid);cursor:pointer;padding:3px 8px;border-radius:6px;
  background:var(--bgsec);border:1px solid var(--border);transition:all 0.15s;}
.arc-crumb:hover{background:var(--primary);color:white;border-color:var(--primary);}
.arc-crumb-sep{color:#bbb;font-size:12px;}
.arc-day-card{background:var(--bgsec);border-radius:12px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border);}
.arc-day-card.editing{border-color:var(--accent);background:#fffdf5;}
.arc-entry-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border);font-size:12px;}
.arc-entry-del{background:none;border:none;color:#ddd;cursor:pointer;font-size:14px;padding:0 4px;line-height:1;flex-shrink:0;}
.arc-entry-del:hover{color:#cc3333;}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:12px;}
.tab-btn{flex:1;background:var(--bgcard);color:var(--textmid);border:2px solid var(--border);
  border-radius:11px;padding:10px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 6px var(--shadow);}
.tab-btn:hover{background:var(--bgsec);color:var(--primary);border-color:var(--primary);}
.tab-btn.active{background:var(--primary);color:white;border-color:var(--primary);box-shadow:0 4px 12px rgba(30,111,191,0.3);}

/* Card */
.card{background:var(--bgcard);border-radius:16px;padding:18px;margin-bottom:12px;
  box-shadow:0 2px 12px var(--shadow);border:1.5px solid var(--border);}
.card-ttl{font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.card-ttl::before{content:"▸";color:var(--accent);font-size:13px;}

/* Date */
.date-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.date-lbl{font-size:11px;font-weight:700;color:var(--textmid);white-space:nowrap;}
.day-chips{display:flex;gap:4px;flex-wrap:wrap;}
.day-chip{background:var(--bgsec);color:var(--textmid);border:1.5px solid var(--border);border-radius:7px;padding:5px 10px;font-size:11px;
  font-family:'Heebo',sans-serif;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.day-chip:hover{background:var(--primaryl);color:white;border-color:var(--primaryl);}
.day-chip.active{background:var(--primary);color:white;border-color:var(--primary);box-shadow:0 2px 8px rgba(30,111,191,0.3);}
.heb-inp{border:1.5px solid var(--border);border-radius:9px;padding:6px 11px;font-family:'Frank Ruhl Libre',serif;font-size:14px;
  font-weight:700;background:white;direction:rtl;min-width:155px;flex:1;color:var(--text);}
.heb-inp:focus{outline:none;border-color:var(--primary);}

/* Cat grid */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
@media(max-width:580px){.cat-grid{grid-template-columns:repeat(2,1fr);}}
.cat-btn{border:2px solid;border-radius:11px;padding:10px 8px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all 0.2s;text-align:center;line-height:1.4;background:white;box-shadow:0 1px 4px var(--shadow);}
.cat-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px var(--shadow);}
.cat-btn strong{font-size:15px;font-family:'Frank Ruhl Libre',serif;}

/* Quick btns */
.qsec{margin-bottom:10px;min-height:32px;}
.qlbl{font-size:10px;font-weight:700;color:var(--textlite);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase;}
.qrow{display:flex;flex-wrap:wrap;gap:4px;}
.qbtn{background:var(--bgsec);border:1.5px solid var(--border);border-radius:16px;padding:4px 10px;font-size:11px;
  font-family:'Heebo',sans-serif;cursor:pointer;transition:all 0.15s;color:var(--textmid);white-space:nowrap;}
.qbtn:hover{background:var(--primaryl);color:white;border-color:var(--primaryl);}
.qbtn.active{background:var(--primary);color:white;border-color:var(--primary);font-weight:700;}
.hint{color:var(--textlite);font-size:11px;}

/* Inputs */
.inp-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;}
@media(max-width:480px){.inp-grid{grid-template-columns:1fr;}}
.fld{display:flex;flex-direction:column;gap:3px;}
.fld label{font-size:10px;font-weight:700;color:var(--textmid);}
.fld input{border:1.5px solid var(--border);border-radius:9px;padding:7px 11px;font-family:'Heebo',sans-serif;font-size:13px;
  color:var(--text);background:white;direction:rtl;transition:border-color 0.2s;}
.fld input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,111,191,0.12);}

/* Big add btn */
.btn-add{width:100%;background:linear-gradient(135deg,var(--primary),var(--primaryl));color:white;border:none;
  border-radius:12px;padding:12px;font-family:'Frank Ruhl Libre',serif;font-size:16px;font-weight:700;
  cursor:pointer;transition:all 0.2s;letter-spacing:1px;box-shadow:0 4px 14px rgba(30,111,191,0.35);}
.btn-add:hover{background:linear-gradient(135deg,var(--accent),var(--accentl));color:var(--text);transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,165,0,0.4);}

/* Log */
.log-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.log-cnt{background:var(--primary);color:white;border-radius:18px;padding:4px 12px;font-size:12px;font-weight:700;}
.entry-row{background:white;border-radius:10px;padding:10px 13px;display:grid;grid-template-columns:auto 1fr auto;
  gap:9px;align-items:start;margin-bottom:6px;box-shadow:0 2px 8px var(--shadow);border:1px solid var(--border);animation:fadein 0.3s;}
@keyframes fadein{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.entry-badge{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-family:'Frank Ruhl Libre',serif;font-size:14px;font-weight:900;flex-shrink:0;}
.entry-body{display:flex;flex-direction:column;gap:2px;}
.e-main{font-size:13px;font-weight:700;color:var(--text);}
.e-sub{font-size:11px;color:var(--textmid);}
.e-meta{font-size:10px;color:var(--textlite);}
.del-btn{background:none;border:none;color:#CCC;font-size:15px;cursor:pointer;padding:2px 5px;border-radius:5px;transition:all 0.15s;flex-shrink:0;}
.del-btn:hover{background:#FFE8E8;color:#CC3333;}
.empty{text-align:center;padding:26px;color:var(--textlite);font-size:13px;line-height:2;}
.exp-row{display:flex;gap:7px;margin-top:12px;justify-content:flex-end;flex-wrap:wrap;}
.btn-sm{border:none;border-radius:9px;padding:8px 14px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-green{background:#E8F5EE;color:#1A7A45;border:1px solid #B0DCC5;} .btn-green:hover{background:#1A7A45;color:white;}
.btn-blue{background:var(--bgsec);color:var(--primary);border:1px solid var(--border);} .btn-blue:hover{background:var(--primary);color:white;}
.btn-red{background:#FEF0F0;color:#CC3333;border:1px solid #F0C0C0;} .btn-red:hover{background:#CC3333;color:white;}

/* Settings */
.set-card{background:white;border-radius:11px;padding:13px;border:1.5px solid var(--border);margin-bottom:10px;cursor:grab;transition:box-shadow 0.2s;}
.set-card.dragging{opacity:0.5;box-shadow:0 8px 24px var(--shadow);}
.set-card:active{cursor:grabbing;}
.drag-handle{font-size:18px;color:#CCC;cursor:grab;margin-left:8px;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.set-hdr{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
.set-badge{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:900;flex-shrink:0;}
.set-name-inp{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-family:'Heebo',sans-serif;font-size:13px;direction:rtl;color:var(--text);}
.set-name-inp:focus{outline:none;border-color:var(--primary);}
.set-lbl{font-size:10px;color:var(--textlite);margin-bottom:5px;}
.set-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;}
.chip{display:flex;align-items:center;gap:3px;background:var(--bgsec);border:1px solid var(--border);
  border-radius:14px;padding:3px 8px 3px 5px;font-size:11px;cursor:grab;}
.chip.chip-sub{background:white;font-size:10px;border-color:#D8E4F0;}
.chip.chip-dragging{opacity:0.4;}
.drag-over{outline:2px dashed var(--primary);border-radius:8px;}
.chip button{background:none;border:none;color:#AAA;cursor:pointer;font-size:12px;padding:0;line-height:1;}
.chip button:hover{color:#CC3333;}
.sub-chips{display:flex;flex-wrap:wrap;gap:4px;padding-right:8px;min-height:10px;}
.task-drag-handle{user-select:none;}
.task-block{background:var(--bgcard);border:1.5px solid var(--border);border-radius:9px;padding:9px 10px;margin-bottom:7px;cursor:grab;transition:box-shadow 0.15s;}
.task-block:hover{box-shadow:0 2px 10px var(--shadow);}
.task-block.dragging{opacity:0.4;}
.task-block-hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.task-drag-icon{color:#ccc;font-size:14px;cursor:grab;flex-shrink:0;}
.task-name{flex:1;font-size:12px;font-weight:700;color:var(--text);}
.task-del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:0;line-height:1;flex-shrink:0;}
.task-del-btn:hover{color:#cc3333;}
.set-add-row{display:flex;gap:6px;}
.set-add-inp{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:5px 9px;font-family:'Heebo',sans-serif;font-size:12px;direction:rtl;color:var(--text);}
.set-add-inp:focus{outline:none;border-color:var(--primary);}
.btn-mini{background:var(--primary);color:white;border:none;border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;white-space:nowrap;}
.btn-mini:hover{background:var(--primaryl);}
.btn-save{width:100%;background:linear-gradient(135deg,var(--primary),var(--primaryl));color:white;border:none;
  border-radius:12px;padding:12px;font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:all 0.2s;}
.btn-save:hover{background:linear-gradient(135deg,var(--accent),var(--accentl));color:var(--text);}

/* Toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--primary);color:white;padding:10px 20px;border-radius:28px;font-size:13px;font-weight:700;
  transition:transform 0.3s;z-index:1000;box-shadow:0 4px 20px rgba(30,111,191,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}

</style>

// Generic save to Supabase (key/value store in table "kv")
async function sbSet(key, value) {
  try {
    var sb = getSB();
    await sb.from("kv").upsert({key: key, value: JSON.stringify(value)}, {onConflict: "key"});
  } catch(e) { console.warn("sbSet failed:", e); }
}

async function sbGet(key) {
  try {
    var sb = getSB();
    var res = await sb.from("kv").select("value").eq("key", key).single();
    if (res.data) return JSON.parse(res.data.value);
  } catch(e) { console.warn("sbGet failed:", e); }
  return null;
}

// Load from Supabase on startup — always pull from cloud to sync across devices
async function syncFromCloud() {
  showToast("🔄 מסנכרן...", 3000);
  try {
    // Use sbGet which uses the Supabase client correctly
    // (previous version had a bug: getSB() returns client object, not API key string)

    // CATS: always pull from cloud (cloud wins)
    var cloudCats = await sbGet('tb_cats');
    if (cloudCats && cloudCats.length) {
      CATS = cloudCats;
      localStorage.setItem('tb_cats', JSON.stringify(CATS));
    }

    // SUBS: always pull from cloud
    var cloudSubs = await sbGet('tb_subs');
    if (cloudSubs) {
      SUBS = cloudSubs;
      localStorage.setItem('tb_subs', JSON.stringify(SUBS));
    }

    // ENTRIES: always pull from cloud (cloud wins for today's entries)
    var cloudEntries = await sbGet('tb_entries');
    if (cloudEntries && cloudEntries.length) {
      ENTRIES = cloudEntries;
      localStorage.setItem('tb_entries', JSON.stringify(ENTRIES));
    }

    // ARCHIVE: merge cloud + local (cloud wins for same gdate)
    var cloudArchive = await sbGet('tb_archive');
    if (cloudArchive && cloudArchive.length) {
      // Start from cloud archive as base
      var merged = cloudArchive.slice();
      // Add local entries that are NOT in cloud
      ARCHIVE.forEach(function(localItem) {
        var idx = merged.findIndex(function(a){ return a.gdate === localItem.gdate; });
        if (idx < 0) {
          merged.push(localItem);
        } else if (localItem.entries && localItem.entries.length > merged[idx].entries.length) {
          merged[idx] = localItem;
        }
      });
      // Also keep ARCHIVE_SEED entries not in merged
      if (typeof ARCHIVE_SEED !== 'undefined') {
        ARCHIVE_SEED.forEach(function(seed) {
          if (merged.findIndex(function(a){ return a.gdate === seed.gdate; }) < 0) merged.push(seed);
        });
      }
      ARCHIVE = merged;
      localStorage.setItem('tb_archive', JSON.stringify(ARCHIVE));
      // Push merged archive back to cloud so all devices stay in sync
      sbSet('tb_archive', ARCHIVE);
    } else if (ARCHIVE.length) {
      // Cloud is empty but local has data — push to cloud
      sbSet('tb_archive', ARCHIVE);
    }

    // WA Phone: always pull from cloud to stay in sync across devices
    var cloudWaPhone = await sbGet('tb_wa_phone');

}

const MONTHS_HEB = ["תשרי","חשון","כסלו","טבת","שבט","אדר","ניסן","אייר","סיון","תמוז","אב","אלול"];
const DAYS_HEB = ["","א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ז׳","ח׳","ט׳","י׳","י״א","י״ב","י״ג","י״ד","ט״ו","ט״ז","י״ז","י״ח","י״ט","כ׳","כ״א","כ״ב","כ״ג","כ״ד","כ״ה","כ״ו","כ״ז","כ״ח","כ״ט","ל׳"];

function hebrewDate(jsDate) {
  var y = jsDate.getFullYear(), m = jsDate.getMonth()+1, d = jsDate.getDate();
  var td = new Date(y,m-1,d);
  var starts = [
    {jd: new Date(2024,9,3),  hy:5785, mlen:[30,29,30,29,30,29,30,30,29,30,29,30]},
    {jd: new Date(2025,8,22), hy:5786, mlen:[30,30,30,29,30,29,30,30,29,30,29,30]},
    {jd: new Date(2026,8,12), hy:5787, mlen:[30,29,30,29,30,29,30,30,29,30,29,30]},
    {jd: new Date(2027,9,1),  hy:5788, mlen:[30,29,30,29,30,29,30,30,29,30,29,30]},
  ];
  var base = null;
  for (var i = starts.length-1; i >= 0; i--) {
    if (td >= starts[i].jd) { base = starts[i]; break; }
  }
  if (!base) return "";
  var diff = Math.round((td - base.jd) / 86400000);
  var cum = 0;
  for (var mi = 0; mi < base.mlen.length; mi++) {
    if (diff < cum + base.mlen[mi]) {
      var day = diff - cum + 1;
      var yearStr = {5785:"ה׳תשפ״ה", 5786:"ה׳תשפ״ו", 5787:"ה׳תשפ״ז", 5788:"ה׳תשפ״ח"}[base.hy] || ("ה׳" + base.hy);
      return DAYS_HEB[day] + " " + MONTHS_HEB[mi] + " " + yearStr;
    }
    cum += base.mlen[mi];
  }
  return "";
}

var DAY_VALUE_MAP = ["יום ראשון","יום שני","יום שלישי","יום רביעי","יום חמישי","ערב שבת","מוצאי שבת"];

function pickDay(el, day) {
  selDay = day;
  document.querySelectorAll(".day-chip").forEach(function(b){ b.classList.remove("active"); });
  el.classList.add("active");
  // When user picks a day manually, shift Hebrew + Gregorian dates accordingly
  syncDatesToDay(day);
  renderLog();
}

function syncDatesToDay(dayValue) {
  // Figure out which weekday was picked
  var targetDow = DAY_VALUE_MAP.indexOf(dayValue);
  if (targetDow < 0) return;
  var now = new Date();
  var currDow = now.getDay();
  var diff = targetDow - currDow;
  // Stay within current week (±3 days max)
  if (diff > 3) diff -= 7;
  if (diff < -3) diff += 7;
  var target = new Date(now.getTime() + diff * 86400000);
  document.getElementById("hebDateInput").value = hebrewDate(target) || hebrewDate(now);
  document.getElementById("gregDateInput").value = gregDateStr(target);
}

}

function onGregDateChange() {
  var val = document.getElementById("gregDateInput").value.trim();
  // Try parse dd/mm/yyyy or yyyy-mm-dd
  var parts, d;
  if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(val)) {
    parts = val.split("/");
    d = new Date(+parts[2], +parts[1]-1, +parts[0]);
  } else if (/^\d{4}-\d{2}-\d{2}$/.test(val)) {
    d = new Date(val);
  }
  if (d && !isNaN(d.getTime())) {
    var dow = d.getDay();
    var label = DAY_LABEL_MAP[dow] || "";
    var value = DAY_VALUE_MAP[dow] || "";
    selDay = value;
    document.querySelectorAll(".day-chip").forEach(function(b){
      b.classList.remove("active");
      if (b.textContent.trim() === label) b.classList.add("active");
    });
    document.getElementById("hebDateInput").value = hebrewDate(d) || document.getElementById("hebDateInput").value;
    renderLog();
  }
}

  CATS.forEach(function(cat) {
    var c = CAT_COLORS[cat.letter] || {bg:"#888",fg:"white"};
    var btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.style.borderColor = c.bg;
    btn.style.backgroundColor = (selCat && selCat.letter === cat.letter) ? c.bg : "";
    btn.style.color = (selCat && selCat.letter === cat.letter) ? c.fg : c.bg;
    btn.innerHTML = "<span style=\"font-size:13px;font-weight:700\">" + cat.name + "</span>";
    btn.onclick = function() { pickCat(cat); };
    g.appendChild(btn);
  });
}

function pickCat(cat) {
  selCat = cat; selTask = null; selSub = null;
  buildCatGrid(); buildTaskBtns(); buildSubBtns();
}

function buildTaskBtns() {
  var el = document.getElementById("taskBtns");
  el.innerHTML = "";
  if (!selCat) { el.innerHTML = '<span class="hint">בחר קטגוריה...</span>'; return; }
  selCat.tasks.forEach(function(t) {
    var b = document.createElement("button");
    b.className = "qbtn" + (selTask === t ? " active" : "");
    b.textContent = t;
    b.onclick = function() { pickTask(t); };
    el.appendChild(b);
  });
}

function pickTask(t) {
  selTask = t; selSub = null;
  document.getElementById("taskInput").value = t;
  buildTaskBtns(); buildSubBtns();
}

function buildSubBtns() {
  var el = document.getElementById("subBtns");
  el.innerHTML = "";
  var subs = selTask ? (SUBS[selTask] || []) : [];
  if (!subs.length) {
    el.innerHTML = '<span class="hint">' + (selTask ? "אין תת-משימות" : "בחר משימה...") + '</span>';
    return;
  }
  subs.forEach(function(s) {
    var b = document.createElement("button");
    b.className = "qbtn" + (selSub === s ? " active" : "");
    b.textContent = s;
    b.onclick = function() { pickSub(s); };
    el.appendChild(b);
  });
}

function pickSub(s) {
  selSub = s;
  document.getElementById("subInput").value = s;
  buildSubBtns();
}


// AUTO ARCHIVE - called after every addEntry
function autoArchiveDay(dayKey, hdate, gdate) {
  var dayEntries = ENTRIES.filter(function(e){ return e.day === dayKey; });
  if (!dayEntries.length) return;
  var existIdx = ARCHIVE.findIndex(function(a){ return a.gdate === gdate; });
  var snapshot = {
    id: existIdx >= 0 ? ARCHIVE[existIdx].id : Date.now(),
    name: hdate,
    hdate: hdate,
    gdate: gdate,
    day: dayKey,
    date: gdate,
    entries: JSON.parse(JSON.stringify(dayEntries)),
    count: dayEntries.length
  };
  if (existIdx >= 0) {
    ARCHIVE[existIdx] = snapshot;
  } else {
    ARCHIVE.unshift(snapshot);
  }
  saveArchive();
}

// ADD ENTRY
function addEntry() {
  var task = document.getElementById("taskInput").value.trim() || selTask || "";
  var sub  = document.getElementById("subInput").value.trim() || selSub || "";
  var notes = document.getElementById("notesInput").value.trim();
  var count = document.getElementById("countInput").value.trim();
  var hdate = document.getElementById("hebDateInput").value.trim();
  if (!selCat) { showToast("⚠️ יש לבחור קטגוריה"); return; }
  if (!task)   { showToast("⚠️ יש להזין משימה"); return; }
  var now = new Date();
  var entry = {
    id: now.getTime(),
    day: selDay, hdate: hdate, gdate: document.getElementById("gregDateInput").value.trim(),
    cat: selCat.letter, catName: selCat.name,
    task: task, sub: sub, notes: notes, count: count,
    // time removed
  };
  ENTRIES.unshift(entry);
  saveEntries();
  autoArchiveDay(entry.day, entry.hdate, entry.gdate);
  clearForm();
  showToast("✓ נוסף ונשמר!");
}

function clearForm() {
  document.getElementById("taskInput").value = "";
  document.getElementById("subInput").value = "";
  document.getElementById("notesInput").value = "";
  document.getElementById("countInput").value = "";
  selTask = null; selSub = null;
  buildTaskBtns(); buildSubBtns();
}

// LOG
function renderLog() {
  var list = document.getElementById("logList");
  var cnt  = document.getElementById("logCount");
  // Show only entries for current selected date
  var curKey = getCurrentDateKey();
  var filtered = ENTRIES.filter(function(e){ return e.gdate === curKey; });
  cnt.textContent = filtered.length;
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">📋<br>אין רשומות לתאריך זה</div>';
    return;
  }
  // Sort by CATS order
  var catOrder = {};
  CATS.forEach(function(cat,ci){ catOrder[cat.letter] = ci; });
  filtered = filtered.slice().sort(function(a,b){
    var ca = catOrder[a.cat] !== undefined ? catOrder[a.cat] : 99;
    var cb = catOrder[b.cat] !== undefined ? catOrder[b.cat] : 99;
    if (ca !== cb) return ca - cb;
    var cat = CATS.find(function(c){ return c.letter === a.cat; });
    if (!cat) return 0;
    return cat.tasks.indexOf(a.task) - cat.tasks.indexOf(b.task);
  });
  list.innerHTML = filtered.map(function(e) {
    var c = CAT_COLORS[e.cat] || {bg:"#888",fg:"white"};
    var dateStr = [e.day, e.hdate, e.gdate ? "("+e.gdate+")" : ""].filter(Boolean).join("  ");
    return '<div class="entry-row" style="border-right:4px solid ' + c.bg + '">'
      + '<div class="entry-badge" style="background:' + c.bg + '"></div>'
      + '<div class="entry-body">'
      + '<div class="e-main">' + e.catName + ' &larr; ' + e.task + (e.sub ? " &rarr; " + e.sub : "") + '</div>'
      + (e.notes ? '<div class="e-sub">' + e.notes + '</div>' : '')
      + '<div class="e-meta">' + [dateStr, e.count ? "כמות: "+e.count : "", ].filter(Boolean).join(" | ") + '</div>'
      + '</div>'
      + '<button class="edit-btn" onclick="editEntry(' + e.id + ')" style="background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;">✏️</button>'
      + '<button class="del-btn" onclick="delEntry(' + e.id + ')">✕</button>'
      + '</div>';
  }).join("");
}

function delEntry(id) {
  var deleted = ENTRIES.find(function(e){ return e.id === id; });
  ENTRIES = ENTRIES.filter(function(e){ return e.id !== id; });
  saveEntries();
  if (deleted) autoArchiveDay(deleted.day, deleted.hdate, deleted.gdate);
  renderLog();
}

function clearAll() {
  if (!confirm("למחוק את כל הרשומות?")) return;
  ENTRIES = []; saveEntries(); renderLog();
}

function sendWhatsApp(){
  var curKey = getCurrentDateKey();
  var todayEntries = ENTRIES.filter(function(e){ return e.gdate === curKey; });
  if(!todayEntries.length){showToast("אין רשומות לשיתוף להיום");return;}
  showToast("מכין תמונה...");
  // Get phone number from settings field, clean it
  var rawPhone = (document.getElementById('waPhone')||{}).value || '';
  var phone = rawPhone.replace(/[^0-9+]/g,'');
  // Convert Israeli local format 05X to international 97X
  if(phone.startsWith('0')) phone = '972' + phone.substring(1);
  _buildReportDiv(function(div){
    html2canvas(div,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false}).then(function(canvas){
      div.style.left='-9999px';
      canvas.toBlob(function(blob){
        // Download the image
        var dataUrl = canvas.toDataURL('image/jpeg',0.95);
        var a=document.createElement('a');
        a.href=dataUrl;
        a.download='yoman.jpg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        // Detect platform
        var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if(isMobile){
          // Mobile APK: window.open -> shouldOverrideUrlLoading -> external app
          setTimeout(function(){
            window.open('https://chat.google.com/','_blank');
          },1000);
          if(phone){
            setTimeout(function(){
              window.open('https://api.whatsapp.com/send?phone='+phone,'_blank');
            },3000);
          }
        } else {
          // Desktop: open apps via protocol URLs only (no browser tabs)
          // WhatsApp first (location.href proven to work for whatsapp://)
          if(phone){
            setTimeout(function(){
              window.location.href = 'whatsapp://send?phone='+phone;
            },1000);
          }
          // Google Chat after WhatsApp
          setTimeout(function(){
            window.location.href = 'googlechat://';
          }, phone ? 3000 : 1000);
        }
      },'image/jpeg',0.95);
    });
  });
}

// ── task drag ──
function taskDragStart(e, ci, ti) {
  _dragKind = "task";
  _dragData = {ci:ci, ti:ti};
  e.dataTransfer.setData("text/plain", "task");
  e.dataTransfer.effectAllowed = "move";
  e.stopPropagation();
  var el = e.currentTarget;
  requestAnimationFrame(function(){ el.classList.add("dragging"); });
}
function taskDragEnd(e) {
  e.currentTarget.classList.remove("dragging");
  document.querySelectorAll(".drag-over").forEach(function(el){ el.classList.remove("drag-over"); });
}
function taskDragOver(e) {
  if (_dragKind !== "task") return;
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.add("drag-over");
}
function taskDragLeave(e) {
  e.currentTarget.classList.remove("drag-over");
}
function taskDrop(e, ci, ti) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove("drag-over");
  if (_dragKind !== "task" || _dragData.ci !== ci || _dragData.ti === ti) return;
  var moved = CATS[ci].tasks.splice(_dragData.ti, 1)[0];
  CATS[ci].tasks.splice(ti, 0, moved);
  _dragKind = null;
  saveCats();
  renderSettings();
}

// ── sub drag ──
function subDragStart(e, ci, ti, si) {
  _dragKind = "sub";
  _dragData = {ci:ci, ti:ti, si:si};
  e.dataTransfer.setData("text/plain", "sub");
  e.dataTransfer.effectAllowed = "move";
  e.stopPropagation();
  var el = e.currentTarget;
  requestAnimationFrame(function(){ el.classList.add("dragging"); });
}
function subDragEnd(e) {
  e.currentTarget.classList.remove("dragging");
  document.querySelectorAll(".drag-over").forEach(function(el){ el.classList.remove("drag-over"); });
}
function subDragOver(e) {
  if (_dragKind !== "sub") return;
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.add("drag-over");
}
function subDragLeave(e) {
  e.currentTarget.classList.remove("drag-over");
}
function subDrop(e, ci, ti, si) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove("drag-over");
  if (_dragKind !== "sub" || _dragData.ci !== ci || _dragData.ti !== ti || _dragData.si === si) return;
  var taskName = CATS[ci].tasks[ti];
  if (!SUBS[taskName]) return;
  var moved = SUBS[taskName].splice(_dragData.si, 1)[0];
  SUBS[taskName].splice(si, 0, moved);
  _dragKind = null;
  saveSubs();
  renderSettings();
}

function removeSub(taskName, si) {
  if (!SUBS[taskName]) return;
  SUBS[taskName].splice(si, 1);
  saveSubs();
  renderSettings();
}

function addSub(ci, ti) {
  var taskName = CATS[ci].tasks[ti];
  var inp = document.getElementById("snewsub-" + ci + "-" + ti);
  if (!inp) return;
  var val = inp.value.trim();
  if (!val) return;
  if (!SUBS[taskName]) SUBS[taskName] = [];
  SUBS[taskName].push(val);
  inp.value = "";
  saveSubs();
  renderSettings();
}

function renderSettings() {
  var ed = document.getElementById("settingsEditor");
  ed.innerHTML = "";
  CATS.forEach(function(cat, ci) {
    var c = CAT_COLORS[cat.letter] || {bg:"#888",fg:"white"};
    var div = document.createElement("div");
    div.className = "set-card";
    div.draggable = true;
    div.dataset.idx = ci;
    div.addEventListener("dragstart", function(e) {
      e.dataTransfer.setData("text/plain", ci);
      setTimeout(function(){ div.classList.add("dragging"); }, 0);
    });
    div.addEventListener("dragend", function() { div.classList.remove("dragging"); });
    div.addEventListener("dragover", function(e) { e.preventDefault(); });
    div.addEventListener("drop", function(e) {
      e.preventDefault();
      var fromIdx = parseInt(e.dataTransfer.getData("text/plain"));
      var toIdx = parseInt(div.dataset.idx);
      if (fromIdx === toIdx) return;
      var moved = CATS.splice(fromIdx, 1)[0];
      CATS.splice(toIdx, 0, moved);
      saveCats();
      renderSettings();
      buildCatGrid();
    });
    var hdr = '<div class="set-hdr">'
      + '<span class="drag-handle">⠿</span>'
      + '<div class="set-badge" style="background:' + c.bg + '"></div>'
      + '<input class="set-name-inp" id="sname-' + ci + '" value="' + cat.name + '" placeholder="שם קטגוריה" onblur="saveCatName('+ ci +')" />'
      + '</div>';
    var tasksHtml = '<div class="set-lbl">משימות (גרור לשינוי סדר):</div>'
      + cat.tasks.map(function(t, ti){
          var subs = SUBS[t] || [];
          var safeT = t.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
          var subsSection = '';
          if(subs.length > 0) {
            subsSection = '<div class="set-lbl" style="font-size:9px;margin:4px 0 2px 0;color:var(--textlite)">תתי משימות:</div>'
              + '<div class="sub-chips">'
              + subs.map(function(s,si){
                  return '<div class="chip chip-sub" draggable="true" '
                    + 'ondragstart="subDragStart(event,'+ci+','+ti+','+si+')" '
                    + 'ondragover="subDragOver(event)" '
                    + 'ondragleave="subDragLeave(event)" '
                    + 'ondrop="subDrop(event,'+ci+','+ti+','+si+')" '
                    + 'ondragend="subDragEnd(event)">'
                    + '<span style="cursor:grab;color:#bbb;font-size:10px;margin-left:2px">⠿</span>'
                    + '<span>'+s+'</span>'
                    + '<button onclick="removeSub(\''+safeT+'\','+si+')">×</button>'
                    + '</div>';
                }).join('')
              + '</div>';
          }
          var addSubRow = '<div style="display:flex;gap:4px;margin-top:4px">'
            + '<input class="set-add-inp" id="snewsub-'+ci+'-'+ti+'" placeholder="+ תת-משימה..." style="font-size:11px" />'
            + '<button class="btn-mini" onclick="addSub('+ci+','+ti+')" style="font-size:10px;padding:4px 8px;white-space:nowrap">+ הוסף</button>'
            + '</div>';
          return '<div class="task-block" draggable="true" '
            + 'ondragstart="taskDragStart(event,'+ci+','+ti+')" '
            + 'ondragover="taskDragOver(event)" '
            + 'ondragleave="taskDragLeave(event)" '
            + 'ondrop="taskDrop(event,'+ci+','+ti+')" '
            + 'ondragend="taskDragEnd(event)">'
            + '<div class="task-block-hdr">'
            + '<span class="task-drag-icon">⠿</span>'
            + '<span class="task-name">'+t+'</span>'
            + '<button onclick="removeTask('+ci+','+ti+')" class="task-del-btn">×</button>'
            + '</div>'
            + subsSection
            + addSubRow
            + '</div>';
        }).join('')
      + '<div class="set-add-row" style="margin-top:8px">'
      + '<input class="set-add-inp" id="snewtask-' + ci + '" placeholder="הוסף משימה..." />'
      + '<button class="btn-mini" onclick="addTask(' + ci + ')">+ הוסף</button>'
      + '</div>';
    div.innerHTML = hdr + tasksHtml;
    ed.appendChild(div);
  });

  // Load saved WA phone
  var waPhoneEl = document.getElementById('waPhone');
  if(waPhoneEl) waPhoneEl.value = localStorage.getItem('tb_wa_phone') || '';
}

function removeTask(ci, ti) {
  CATS[ci].tasks.splice(ti, 1);
  saveCats();
  renderSettings();
}
function addTask(ci) {
  var inp = document.getElementById("snewtask-" + ci);
  var val = inp.value.trim();
  if (!val) return;
  CATS[ci].tasks.push(val);
  inp.value = "";
  saveCats();
  renderSettings();
}
function saveCatName(ci) {
  var inp = document.getElementById("sname-" + ci);
  if (inp && inp.value.trim()) {
    CATS[ci].name = inp.value.trim();
    saveCats();
  }
}
function saveSettings() {
  CATS.forEach(function(cat, ci) {
    var inp = document.getElementById("sname-" + ci);
    if (inp) {
      var newName = inp.value.trim();
      if (newName && newName !== cat.name) {
        if (SUBS[cat.name]) { SUBS[newName] = SUBS[cat.name]; delete SUBS[cat.name]; }
        CATS[ci].name = newName;
      }
    }
  });
  saveCats(); saveSubs(); buildCatGrid();
  showToast("✓ נשמר!");
}

// TOAST
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show";
  setTimeout(function(){ t.className = "toast"; }, 2500);
}

// END OF DAY
function endDay() {
  if (!ENTRIES.length) { showToast("אין רשומות לשמירה"); return; }
  var hdate = document.getElementById("hebDateInput").value || hebrewDate(new Date());
  var gdate = document.getElementById("gregDateInput").value || gregDateStr(new Date());
  var dayName = selDay || "";
  var name = [dayName, hdate, gdate ? "| "+gdate : ""].filter(Boolean).join(" ");
  if (!confirm("לסיים את יום " + name + " ולשמור " + ENTRIES.length + " רשומות לארכיון?")) return;
  var curKey = getCurrentDateKey();
  var todayEntries = ENTRIES.filter(function(e){ return e.gdate === curKey; });
  if (!todayEntries.length) { showToast("אין רשומות לתאריך זה"); return; }
  var snapshot = {
    id: Date.now(),
    name: name,
    hdate: hdate,
    gdate: gdate,
    day: dayName,
    date: new Date().toLocaleDateString("he-IL"),
    entries: JSON.parse(JSON.stringify(todayEntries)),
    count: todayEntries.length
  };
  ARCHIVE.unshift(snapshot);
  saveArchive();
  ENTRIES = ENTRIES.filter(function(e){ return e.gdate !== curKey; });
  saveEntries();
  selDay = "";
  selCat = null; selTask = null; selSub = null;
  document.querySelectorAll(".day-chip").forEach(function(b){ b.classList.remove("active"); });
  buildCatGrid(); buildTaskBtns(); buildSubBtns();
  showToast("✓ יום נשמר! " + snapshot.count + " רשומות בארכיון");
}

var ARCHIVE = (function() {
  var stored = localStorage.getItem("tb_archive");
  if (stored) {
    var arr = JSON.parse(stored);
    // Merge: add seeds that are not already in stored (by gdate)
    var existingGdates = arr.map(function(s){ return s.gdate; });
    ARCHIVE_SEED.forEach(function(seed) {
      if (existingGdates.indexOf(seed.gdate) < 0) arr.push(seed);
    });
    return arr;
  }
  return JSON.parse(JSON.stringify(ARCHIVE_SEED));
})();

function archiveCurrent() {
  if (!ENTRIES.length) { showToast("אין רשומות לשמירה"); return; }
  var name = document.getElementById("archiveName").value.trim();
  if (!name) {
    var today = document.getElementById("hebDateInput").value || hebrewDate(new Date());
    var gd = document.getElementById("gregDateInput").value || gregDateStr(new Date());
    name = today + (gd ? " | " + gd : "");
  }
  var snapshot = {
    id: Date.now(),
    name: name,
    date: new Date().toLocaleDateString("he-IL"),
    entries: JSON.parse(JSON.stringify(ENTRIES)),
    count: ENTRIES.length
  };
  ARCHIVE.unshift(snapshot);
  saveArchive();
  document.getElementById("archiveName").value = "";
  renderArchive();
  showToast("✓ יומן נשמר בארכיון!");
}

// Build ARC_PREMADE dynamically from אלול תשפ"ה up to current Hebrew year+month
var ARC_PREMADE = (function() {
  var result = [];
  // Fixed: start from אלול תשפ"ה
  var startYear = 5785, startMonthIdx = 13; // אלול = index 13 in HMO
  var nowYM = (function(){
    var hd = hebrewDate(new Date());
    if (!hd) return {hy:5786, mi:5}; // fallback
    var parts = hd.trim().split(" ");
    var year = 5786, mi = 5;
    for (var i = parts.length-1; i >= 0; i--) {
      if (parts[i].indexOf("׳") >= 0) {
        // extract numeric year from gematria (rough: count ת=400,ש=300,פ=80,ו=6 etc)
        // simpler: use the hy from hebrewDate internals via a lookup
        parts.splice(i,1); break;
      }
    }
    var HMO2 = ["תשרי","חשון","כסלו","טבת","שבט","אדר","אדר א","אדר ב","ניסן","אייר","סיון","תמוז","אב","אלול"];
    mi = HMO2.indexOf(parts.slice(1).join(" ").trim());
    return {hdate: hd, mi: mi < 0 ? 5 : mi};
  })();

  // Hebrew year names
  var yearNames = {5785:"ה׳תשפ״ה", 5786:"ה׳תשפ״ו", 5787:"ה׳תשפ״ז", 5788:"ה׳תשפ״ח", 5789:"ה׳תשפ״ט", 5790:"ה׳תש״ץ"};
  var HMO2 = ["תשרי","חשון","כסלו","טבת","שבט","אדר","אדר א","אדר ב","ניסן","אייר","סיון","תמוז","אב","אלול"];

  // Figure out current hy from hebrewDate
  var nowHD = hebrewDate(new Date()) || "";
  var nowHY = 5786; // default
  var nowMI = 5;
  for (var hy in yearNames) {
    if (nowHD.indexOf(yearNames[hy]) >= 0) { nowHY = parseInt(hy); break; }
  }
  var nowMonthStr = nowHD.split(" ").slice(1, -1).join(" ").trim();
  nowMI = HMO2.indexOf(nowMonthStr);
  if (nowMI < 0) nowMI = 5;

  // Build from 5785/אלול to nowHY/nowMI
  for (var y = startYear; y <= nowHY; y++) {
    var yname = yearNames[y] || ("ה׳" + y);
    var mStart = (y === startYear) ? startMonthIdx : 0;
    var mEnd = (y === nowHY) ? nowMI : HMO2.length - 1;
    var months = [];
    for (var mi = mStart; mi <= mEnd; mi++) {
      if (HMO2[mi]) months.push(HMO2[mi]);
    }
    if (months.length) result.push({year: yname, months: months});
  }
  return result;
})();
var HMO = ["תשרי","חשון","מרחשון","כסלו","טבת","שבט","אדר","אדר א","אדר ב","ניסן","אייר","סיון","תמוז","אב","אלול"];

function extractYM(hdate) {
  if (!hdate) return {year:"", month:"", order:99};
  // Skip Gregorian-format dates
  if (/\d{4}/.test(hdate) && !/ה׳תש/.test(hdate)) return {year:"", month:"", order:99};
  var parts = hdate.trim().split(" ");
  var year = "", month = "";
  for (var i = parts.length-1; i >= 0; i--) {
    if (parts[i].indexOf("׳") >= 0) { year = parts[i]; parts.splice(i,1); break; }
  }
  month = parts.slice(1).join(" ").trim();
  return {year: year||"לא ידוע", month: month||"לא ידוע", order: HMO.indexOf(month)};
}

// Get all days (from ARCHIVE snapshots + live non-today ENTRIES)
function getAllArchiveDays() {
  var todayKey = getTodayKey();
  var days = {};

  // From ARCHIVE snapshots
  ARCHIVE.forEach(function(snap) {
    var k = snap.gdate || snap.id;
    if (!days[k]) days[k] = {gdate:snap.gdate||"", hdate:snap.hdate||"", day:snap.day||"",
      name:snap.name, entries:[], snapId:snap.id};
    // merge entries from snapshot if not already there
    (snap.entries||[]).forEach(function(e){ days[k].entries.push(e); });
  });

  // From live ENTRIES (including today — so current day is visible in archive)
  ENTRIES.forEach(function(e) {
    var k = e.gdate || "";
    if (!days[k]) days[k] = {gdate:e.gdate||"", hdate:e.hdate||"", day:e.day||"",
      name:[e.day,e.hdate,e.gdate?"| "+e.gdate:""].filter(Boolean).join(" "), entries:[], snapId:null};
    if(!days[k].entries.find(function(x){return x.id===e.id;})) days[k].entries.push(e);
  });

  return days;
}

function getYearsWithData() {
  var days = getAllArchiveDays();
  var years = {};
  Object.values(days).forEach(function(d) {
    var ym = extractYM(d.hdate);
    if (ym.year) years[ym.year] = true;
  });
  return years;
}

function getMonthsWithData(year) {
  var days = getAllArchiveDays();
  var months = {};
  Object.values(days).forEach(function(d) {
    var ym = extractYM(d.hdate);
    if (ym.year === year) months[ym.month] = true;
  });
  return months;
}

function getDaysInMonth(year, month) {
  var days = getAllArchiveDays();
  var result = [];
  Object.values(days).forEach(function(d) {
    var ym = extractYM(d.hdate);
    if (ym.year === year && ym.month === month) result.push(d);
  });
  // Sort by Hebrew day number within month
  var HEB_ORD = {"א":1,"ב":2,"ג":3,"ד":4,"ה":5,"ו":6,"ז":7,"ח":8,"ט":9,"י":10,"יא":11,"יב":12,"יג":13,"יד":14,"טו":15,"טז":16,"יז":17,"יח":18,"יט":19,"כ":20,"כא":21,"כב":22,"כג":23,"כד":24,"כה":25,"כו":26,"כז":27,"כח":28,"כט":29,"ל":30};
  function hdayNum(hdate) {
    var d = (hdate||"").split(" ")[0].replace(/[׳״]/g,"");
    return HEB_ORD[d] || 999;
  }
  result.sort(function(a,b){ return hdayNum(a.hdate) - hdayNum(b.hdate); });
  return result;
}

// ── detect current Hebrew year/month ──
function getNowHebYM() {
  var hd = hebrewDate(new Date());
  return extractYM(hd);
}

function arcDeleteEntry(gdateKey, entryId) {
  // Remove from ARCHIVE snapshots
  ARCHIVE.forEach(function(snap) {
    snap.entries = (snap.entries||[]).filter(function(e){ return e.id !== entryId; });
    snap.count = snap.entries.length;
  });
  saveArchive();
  // Remove from live ENTRIES
  ENTRIES = ENTRIES.filter(function(e){ return e.id !== entryId; });
  saveEntries();
  renderArcDetail();
  renderArcBreadcrumb();
}

function arcAddEntry(gdateKey) {
  var days = getAllArchiveDays();
  var d = days[arcSelDayKey];
  if (!d) return;
  var catSel = document.getElementById("arc-add-cat");
  var taskSel = document.getElementById("arc-add-task");
  var notesSel = document.getElementById("arc-add-notes");
  if (!catSel || !taskSel) return;
  var letter = catSel.value;
  var cat = CATS.find(function(c){ return c.letter === letter; });
  if (!cat) return;
  var newEntry = {
    id: Date.now(),
    day: d.day, hdate: d.hdate, gdate: d.gdate,
    cat: letter, catName: cat.name,
    task: taskSel.value, sub: "", notes: notesSel ? notesSel.value.trim() : "", count: ""
  };
  // Add to ARCHIVE snapshot if exists
  var snap = ARCHIVE.find(function(s){ return s.gdate === d.gdate; });
  if (snap) {
    snap.entries.unshift(newEntry);
    snap.count = snap.entries.length;
    saveArchive();
  } else {
    // Add to live ENTRIES
    ENTRIES.unshift(newEntry);
    saveEntries();
  }
  renderArcDetail();
}

function renderArchive() {
  // Initialize archive view at year level, defaulting to current year
  var nowYM = getNowHebYM();
  arcSelYear = nowYM.year || null;
  arcSelMonth = null;
  arcSelDayKey = null;
  arcEditMode = false;

  // Show years panel, hide others
  document.getElementById("arc-years").style.display = "block";
  document.getElementById("arc-months").style.display = "none";
  document.getElementById("arc-days").style.display = "none";
  document.getElementById("arc-detail").style.display = "none";

  renderArcYears();
  renderArcBreadcrumb();

  // Auto-drill to current year
  if (arcSelYear) {
    arcGoMonths(arcSelYear);
    // Auto-drill to current month
    if (nowYM.month) {
      arcGoDays(arcSelYear, nowYM.month);
    }
  }
}

function restoreArchive(id) {
  var snap = ARCHIVE.find(function(s){ return s.id === id; });
  if (!snap) return;
  if (!confirm("לטעון את היומן \"" + snap.name + "\"? הרשומות הנוכחיות יוחלפו.")) return;
  ENTRIES = JSON.parse(JSON.stringify(snap.entries));
  saveEntries();
  showToast("✓ יומן נטען!");
}

function deleteArchive(id) {
  if (!confirm("למחוק יומן זה מהארכיון?")) return;
  ARCHIVE = ARCHIVE.filter(function(s){ return s.id !== id; });
  saveArchive();
  renderArchive();
}

function exportArchivePDF(id) {
  var snap = ARCHIVE.find(function(s){ return s.id === id; });
  if (!snap) return;
  var savedEntries = ENTRIES;
  ENTRIES = snap.entries;
  var savedDay = selDay;

  var origHeb = document.getElementById("hebDateInput").value;
  document.getElementById("hebDateInput").value = snap.name;
  exportPDF();
  ENTRIES = savedEntries;
  selDay = savedDay;
  document.getElementById("hebDateInput").value = origHeb;
}

function simpleHash(str) {
  var h = 0;
  for (var i = 0; i < Math.min(str.length, 5000); i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return h.toString(36);
}

function showUpdateBanner(newContent) {
  var banner = document.getElementById("updateBanner");
  if (banner) return;
  banner = document.createElement("div");
  banner.id = "updateBanner";

    + '<div style="display:flex;gap:8px">'
    + '<button id="updateNowBtn" style="background:#C9A84C;color:#101A3A;border:none;border-radius:8px;padding:7px 16px;font-family:Heebo,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">⬇ עדכן עכשיו</button>'
    + '<button onclick="document.getElementById(\'updateBanner\').remove()" style="background:rgba(255,255,255,0.15);color:#F5EDD6;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;">✕</button>'
    + '</div>';
  document.body.prepend(banner);
  document.getElementById("updateNowBtn").onclick = function() {
    // Save current data before updating
    var savedData = {
      entries: localStorage.getItem("tb_entries"),
      cats: localStorage.getItem("tb_cats"),
      subs: localStorage.getItem("tb_subs"),
      archive: localStorage.getItem("tb_archive")
    };
    // Replace page with new content
    document.open();
    document.write(newContent);
    document.close();
    // Restore data
    if (savedData.entries) localStorage.setItem("tb_entries", savedData.entries);
    if (savedData.cats) localStorage.setItem("tb_cats", savedData.cats);
    if (savedData.subs) localStorage.setItem("tb_subs", savedData.subs);
    if (savedData.archive) localStorage.setItem("tb_archive", savedData.archive);
    localStorage.setItem(UPDATE_KEY, simpleHash(newContent));
  };
}

function checkForUpdates() {
  var currentHash = localStorage.getItem(UPDATE_KEY) || "";
  fetch(RAW_URL + "?t=" + Date.now())
    .then(function(r){ return r.text(); })
    .then(function(text){
      var remoteHash = simpleHash(text);
      if (remoteHash !== currentHash) {
        // First run or genuine update
        if (currentHash === "") {
          // First time - just save hash, no banner
          localStorage.setItem(UPDATE_KEY, remoteHash);
        } else {
          showUpdateBanner(text);
        }
      }
    })
    .catch(function(){ /* offline - silent */ });
}

  setTimeout(checkForUpdates, 2000);
  setInterval(checkForUpdates, 5 * 60 * 1000);
});

  buildCatGrid();
  buildSubBtns();
  renderLog();
  // Sync from cloud - wait for Supabase to load, retry if needed
  function trySync(attempt) {
    if (typeof supabase !== 'undefined') {
      syncFromCloud();
    } else if (attempt < 10) {
      setTimeout(function(){ trySync(attempt + 1); }, 1000);
    } else {
      showToast("⚠️ לא הצליח לטעון סנכרון", 2000);
    }
  }
  setTimeout(function(){ trySync(0); }, 1500);
});

function editEntry(id) {
  var e = ENTRIES.find(function(x){ return x.id === id; });
  if(!e) return;
  var row = document.querySelector('[onclick*="delEntry(' + id + ')"]');
  if(!row) { row = document.querySelector('[onclick*="editEntry(' + id + ')"]'); }
  if(!row) return;
  var container = row.closest('.entry-row');
  if(!container) return;
  container.innerHTML =
    '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:6px;background:#fffbe6;border-radius:6px;">' +
    '<input id="ei_sub" value="' + (e.sub||'') + '" placeholder="תת-משימה" style="flex:2;padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-family:Heebo,sans-serif;">' +
    '<input id="ei_count" value="' + (e.count||'') + '" placeholder="כמות" style="width:60px;padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-family:Heebo,sans-serif;">' +
    '<input id="ei_notes" value="' + (e.notes||'') + '" placeholder="הרחבה" style="flex:3;padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-family:Heebo,sans-serif;">' +
    '<button onclick="saveEntry(' + id + ')" style="padding:4px 10px;background:#1A2B5E;color:white;border:none;border-radius:4px;cursor:pointer;font-family:Heebo,sans-serif;">שמור</button>' +
    '<button onclick="renderLog()" style="padding:4px 10px;background:#aaa;color:white;border:none;border-radius:4px;cursor:pointer;font-family:Heebo,sans-serif;">ביטול</button>' +
    '</div>';
}

function saveEntry(id) {
  var e = ENTRIES.find(function(x){ return x.id === id; });
  if(!e) return;
  e.sub = document.getElementById('ei_sub').value.trim();
  e.count = document.getElementById('ei_count').value.trim();
  e.notes = document.getElementById('ei_notes').value.trim();
  saveEntries();
  renderLog();
  showToast('נשמר!');
}

function arcEditEntry(gdateKey, entryId) {
  var days = getAllArchiveDays();
  var d = days[gdateKey];
  if(!d) return;
  var e = d.entries.find(function(x){ return x.id === entryId; });
  if(!e) return;
  // Find the row element and replace with inline edit form
  var rows = document.querySelectorAll('.arc-entry-row');
  var target = null;
  rows.forEach(function(r){
    if(r.innerHTML.indexOf('arcDeleteEntry(\'' + gdateKey + '\',' + entryId + ')') > -1 ||
       r.innerHTML.indexOf('arcEditEntry(\'' + gdateKey + '\',' + entryId + ')') > -1) {
      target = r;
    }
  });
  if(!target) return;
  target.innerHTML =
    '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:4px;background:#fffbe6;border-radius:6px;width:100%;">' +
    '<input id="aei_task" value="' + (e.task||'').replace(/"/g,'&quot;') + '" placeholder="משימה" style="flex:2;padding:4px 8px;border:1px solid #ccc;border-radius:4px;min-width:80px;font-family:Heebo,sans-serif;font-size:12px;">' +
    '<input id="aei_sub" value="' + (e.sub||'').replace(/"/g,'&quot;') + '" placeholder="תת-משימה" style="flex:2;padding:4px 8px;border:1px solid #ccc;border-radius:4px;min-width:80px;font-family:Heebo,sans-serif;font-size:12px;">' +
    '<input id="aei_count" value="' + (e.count||'') + '" placeholder="כמות" style="width:55px;padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-family:Heebo,sans-serif;font-size:12px;">' +
    '<input id="aei_notes" value="' + (e.notes||'').replace(/"/g,'&quot;') + '" placeholder="הרחבה" style="flex:3;padding:4px 8px;border:1px solid #ccc;border-radius:4px;min-width:80px;font-family:Heebo,sans-serif;font-size:12px;">' +
    '<button onclick="arcSaveEntry(\'' + gdateKey + '\',' + entryId + ')" style="padding:4px 10px;background:#1A2B5E;color:white;border:none;border-radius:4px;cursor:pointer;font-family:Heebo,sans-serif;">שמור</button>' +
    '<button onclick="renderArcDetail()" style="padding:4px 10px;background:#aaa;color:white;border:none;border-radius:4px;cursor:pointer;font-family:Heebo,sans-serif;">בטל</button>' +
    '</div>';
}

function arcSaveEntry(gdateKey, entryId) {
  // Update in ARCHIVE
  ARCHIVE.forEach(function(snap) {
    (snap.entries||[]).forEach(function(e) {
      if(e.id === entryId) {
        e.task  = document.getElementById('aei_task').value.trim();
        e.sub   = document.getElementById('aei_sub').value.trim();
        e.count = document.getElementById('aei_count').value.trim();
        e.notes = document.getElementById('aei_notes').value.trim();
      }
    });
  });
  saveArchive();
  renderArcDetail();
  showToast('נשמר!');
}

// Enter key support for entry and edit tabs
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var id = e.target.id || '';
  // Entry tab inputs: taskInput, subInput, countInput, notesInput
  if (id === 'taskInput' || id === 'subInput' || id === 'countInput' || id === 'notesInput') {
    e.preventDefault();
    if (typeof addEntry === 'function') addEntry();
    return;
  }
  // Edit tab new-sub inputs: snewsub-ci-ti
  if (id.startsWith('snewsub-')) {
    e.preventDefault();
    var parts = id.replace('snewsub-', '').split('-');
    var ci = parseInt(parts[0]), ti = parseInt(parts[1]);
    if (typeof addSub === 'function') addSub(ci, ti);
    return;
  }
});
</script>
