name: Build Signed APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Copy web assets into android project
        run: |
          cd android
          ASSETS="app/src/main/assets"
          rm -rf "$ASSETS"
          mkdir -p "$ASSETS/icons"
          cp ../index.html    "$ASSETS/index.html"
          cp ../manifest.json "$ASSETS/manifest.json"
          cp ../sw.js         "$ASSETS/sw.js"
          cp -r ../icons/* "$ASSETS/icons/" 2>/dev/null || true
          echo "Assets copied:"
          ls -R "$ASSETS"

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.7 --no-daemon

      - name: Build release APK (unsigned)
        run: |
          cd android
          ./gradlew :app:assembleRelease --no-daemon

      - name: Sign APK with permanent keystore
        run: |
          cd android
          BT=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          echo "Using build-tools: $BT"
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk
          "$BT/zipalign" -p -f 4 "$UNSIGNED" aligned.apk
          "$BT/apksigner" sign \
            --ks ../signing/yoman.keystore \
            --ks-key-alias yoman \
            --ks-pass pass:yoman123 \
            --key-pass pass:yoman123 \
            --out yoman-avoda-signed.apk \
            aligned.apk
          "$BT/apksigner" verify --print-certs yoman-avoda-signed.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: yoman-avoda-signed-apk
          path: android/yoman-avoda-signed.apk
